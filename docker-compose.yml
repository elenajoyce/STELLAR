version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: astraea-postgres
    environment:
      POSTGRES_USER: astraea
      POSTGRES_PASSWORD: astraea_secure_password_99
      POSTGRES_DB: astraea_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astraea -d astraea_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: astraea-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
